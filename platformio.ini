; M5Core2Radio — winRadio ported to M5Stack Core2
; Original project by Volos Projects (Waveshare ESP32-S3 Radio)
; Core2 port: I2S audio via NS4168 amp, capacitive touch controls

[env:m5stack-core2]
platform                  = espressif32
board                     = m5stack-core2
framework                 = arduino
monitor_speed             = 115200
upload_speed              = 921600
board_build.partitions    = huge_app.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
lib_deps =
    m5stack/M5Core2@^0.1.9
    esphome/ESP32-audioI2S@^2.3.0
    adafruit/Adafruit Si4713 Library@^1.2.0
